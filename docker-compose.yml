version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/edge-routing/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/edge-routing/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-app
      - gateway-api
      - martin
      - otel-collector

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: "http nginx:80"
    ports:
      - "4040:4040"
    depends_on:
      - nginx

  web-app:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ./apps/web-app:/app
    command: "bun run dev"
    environment:
      - PUBLIC_API_URL=http://localhost/api
    ports:
      - "4321:4321"

  gateway-api:
    image: rust:1.85-slim
    working_dir: /app
    volumes:
      - .:/app
    command: "cargo run -p gateway-api"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/jumpa
      - SCYLLA_URI=scylladb:9042
      - REDIS_URL=redis://redis:6379
      - SPATIAL_ENGINE_URL=http://spatial-compute:50051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - scylladb
      - redis
      - spatial-compute

  spatial-compute:
    image: rust:1.85-slim
    working_dir: /app
    volumes:
      - .:/app
    command: "cargo run -p spatial-compute"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jumpa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  scylladb:
    image: scylladb/scylla:latest
    command: --smp 1 --memory 1G --developer-mode 1
    ports:
      - "9042:9042"
    volumes:
      - scylla-data:/var/lib/scylla

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  martin:
    image: maplibre/martin
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/jumpa
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  otel-collector:
    image: otel/opentelemetry-collector:latest
    volumes:
      - ./infra/observability/otel-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - tempo

volumes:
  postgres-data:
  scylla-data:
  minio-data:
  tempo-data:
